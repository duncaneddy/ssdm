name = "ssdm"
main = "build/worker/shim.mjs"
compatibility_date = "2026-06-01"
workers_dev = false

[build]
command = "cargo install -q worker-build && worker-build --release"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "ssdm-data"

[[queues.producers]]
binding = "QUEUE"
queue   = "ssdm-ingest"

[[queues.consumers]]
queue             = "ssdm-ingest"
max_batch_size    = 5
max_batch_timeout = 30
max_retries       = 20

[triggers]
# 06:17 UTC — offset from the top of the hour (and off the common :00/:15/:30
# cron marks) so our upstream fetches avoid the herd hitting IERS/CelesTrak at
# exact update times.
crons = ["17 6 * * *"]
